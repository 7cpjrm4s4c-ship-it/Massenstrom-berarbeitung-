<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Massenstromrechner</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #07090f;
      color: #fff;
    }
    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    .header h1 {
      margin: 0;
      font-size: 32px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .tab {
      padding: 12px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: #111827;
      cursor: pointer;
      font-weight: 600;
    }
    .tab.active {
      background: #4f46e5;
      border-color: #6d63ff;
    }
    .panel {
      display: none;
      background: #0f172a;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 20px;
    }
    .panel.active { display: block; }
    .grid {
      display: grid;
      gap: 14px;
    }
    label {
      display: block;
      font-size: 14px;
      opacity: .9;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: #111827;
      color: #fff;
      font-size: 16px;
    }
    button.primary {
      margin-top: 10px;
      width: 100%;
      padding: 16px;
      border: 0;
      border-radius: 16px;
      background: #5b52ff;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .state-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 14px;
      background: #111827;
      white-space: pre-line;
      min-height: 80px;
    }
    canvas {
      width: 100%;
      height: 420px;
      background: #08111f;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.08);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Massenstromrechner</h1>
    </div>

    <div class="tabs">
      <div class="tab" onclick="openTab('vent')">Lüftung</div>
      <div class="tab" onclick="openTab('pipe')">Rohrdimensionierung</div>
      <div class="tab active" onclick="openTab('hx')">h,x-Diagramm</div>
    </div>

    <section id="tab-hx" class="panel active">
      <h2>h,x-Diagramm nach Mollier</h2>

      <div class="tabs" style="margin-top:12px;">
        <div id="mode-x" class="tab active" onclick="setInMode('x')">x [g/kg]</div>
        <div id="mode-phi" class="tab" onclick="setInMode('phi')">φ [%]</div>
      </div>

      <div class="grid">
        <div>
          <label for="in-t">Temperatur t</label>
          <input id="in-t" type="text" inputmode="decimal" placeholder="z.B. -10 oder 22,5" />
        </div>

        <div id="wrap-x">
          <label for="in-x">Feuchtegehalt x</label>
          <input id="in-x" type="text" inputmode="decimal" placeholder="z.B. 1,44" />
        </div>

        <div id="wrap-phi" style="display:none;">
          <label for="in-phi">Relative Feuchte φ</label>
          <input id="in-phi" type="text" inputmode="decimal" placeholder="z.B. 50" />
        </div>
      </div>

      <button class="primary" onclick="hxAddPointFromInput()">Zustand setzen</button>

      <div id="in-err" style="margin-top:10px;color:#fca5a5;"></div>
      <div id="hx-state" class="state-box">Noch kein Zustand gesetzt</div>

      <div style="margin-top:20px;">
        <canvas id="hx"></canvas>
      </div>
    </section>

    <section id="tab-vent" class="panel">
      <h2>Lüftung</h2>
      <p>Bestehende Lüftungslogik wird hier angebunden.</p>
    </section>

    <section id="tab-pipe" class="panel">
      <h2>Rohrdimensionierung</h2>
      <p>Bestehende Rohrlogik wird hier angebunden.</p>
    </section>
  </div>

  <script>
    let inMode = 'x';

    function openTab(name) {
      document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tabs .tab').forEach(el => el.classList.remove('active'));

      document.getElementById('tab-' + name).classList.add('active');

      const labels = {
        vent: 'Lüftung',
        pipe: 'Rohrdimensionierung',
        hx: 'h,x-Diagramm'
      };

      document.querySelectorAll('.tabs .tab').forEach(el => {
        if (el.textContent.trim() === labels[name]) el.classList.add('active');
      });
    }

    function setInMode(mode) {
      inMode = mode;
      document.getElementById('wrap-x').style.display = mode === 'x' ? 'block' : 'none';
      document.getElementById('wrap-phi').style.display = mode === 'phi' ? 'block' : 'none';
      document.getElementById('mode-x').classList.toggle('active', mode === 'x');
      document.getElementById('mode-phi').classList.toggle('active', mode === 'phi');
    }

    function num(v) {
      if (v === null || v === undefined) return NaN;
      const n = parseFloat(String(v)
        .replace(/−|–|--/g, '-')
        .replace(',', '.')
        .trim());
      return isNaN(n) ? NaN : n;
    }

    function hxAddPointFromInput() {
      const T = num(document.getElementById('in-t').value);
      const X = num(document.getElementById('in-x').value);
      const PHI = num(document.getElementById('in-phi').value);
      const err = document.getElementById('in-err');

      err.textContent = '';

      if (isNaN(T)) {
        err.textContent = 'Bitte gültige Temperatur eingeben';
        return;
      }

      if (inMode === 'x' && isNaN(X)) {
        err.textContent = 'Bitte gültigen Feuchtegehalt x eingeben';
        return;
      }

      if (inMode === 'phi' && isNaN(PHI)) {
        err.textContent = 'Bitte gültige relative Feuchte φ eingeben';
        return;
      }

      const state = {
        T,
        mode: inMode,
        x: inMode === 'x' ? X : null,
        phi: inMode === 'phi' ? PHI : null
      };

      document.getElementById('hx-state').textContent =
        `T: ${state.T} °C\n` +
        `x: ${state.x ?? '-'} g/kg\n` +
        `φ: ${state.phi ?? '-'} %\n` +
        `Mode: ${state.mode}`;

      console.log('HX STATE', state);
    }
  </script>
</body>
</html>
