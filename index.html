<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Massenstromrechner – Final Upload</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="hdr">
  <div class="hdr-top">
    <div class="hdr-icon">&#7745;</div>
    <div>
      <div class="hdr-title">Massenstromrechner</div>
      <div class="hdr-sub">HLK-Anlagen · Heizung · Kälte · Lüftung</div>
    </div>
  </div>

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="flow">Heizung/Kälte</button>
    <button class="tab-btn" data-tab="luft">Lüftung</button>
    <button class="tab-btn" data-tab="hx">h,x-Diagramm</button>
    <button class="tab-btn" data-tab="pipe">Rohrdimensionierung</button>
    <button class="tab-btn" data-tab="unit">Einheiten</button>
  </nav>
</header>

<div class="tab-content" id="tab-hx">
  <div class="hx-content-area">
    <div class="hx-diag-shell">
      <canvas id="hxCanvas"></canvas>
    </div>

    <div class="hx-gc" id="states-wrap">
      <div class="hx-slbl">Luftzustände</div>
      <div id="states-list"></div>
    </div>
  </div>
</div>

<script src="hx-diagram.js"></script>
<script src="pdf-export.js"></script>
<script src="air-treatment.js"></script>
<script src="app.js"></script>

</body>
</html>
